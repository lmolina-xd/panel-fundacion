<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fundación Scherbovsky</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── DATOS DEL PANEL ────────────────────────────────────────────────────────
// Completá los "url" con los links reales
const DOCS = [
  { type:"t", icon:"👥", title:"Tracker Pacientes",        desc:"Control de datos de pacientes activos",   url:"https://docs.google.com/spreadsheets/d/1z8rpddlW4BKofgZjOsfpuDxMg5NxEsRZBFNJ_WKMc3k/edit?usp=sharing" },
  { type:"t", icon:"💊", title:"Medicación Dispensada",    desc:"Control de medicación dispensada",        url:"https://docs.google.com/spreadsheets/d/1gFuBcZFKX7z4e9ICyxV5N6zrFMU1SnkheUzaBsL5tTA/edit?usp=sharing" },
  { type:"t", icon:"📈", title:"Tracker Tiempos",          desc:"Tiempos de cada visita",                  url:"https://docs.google.com/spreadsheets/d/1wlt0G7g4vBQv8UoNHIwaWUIgioGtNEiOA_tKbCNFlNQ/edit?usp=sharing" },
  { type:"t", icon:"📋", title:"Tareas Coordinación",      desc:"Tracker de tareas de coordinación",       url:"https://docs.google.com/spreadsheets/d/16drdI_JwmXRX3JEiAVxovj78ktXNIcde/edit?usp=sharing&ouid=101751013359472747775&rtpof=true&sd=true" },
  { type:"t", icon:"✍️", title:"Accesos sistemas",         desc:"Accesos para todos los sitemas",          url:"https://docs.google.com/spreadsheets/d/1WBPxT-WqC4b6IhXuZ1ORA5yB6R0qwYcnzrlqB_tlohk/edit?usp=sharing" },
];

const SECTION_META = {
  t: { label:"Trackers",    color:"#6366f1", bg:"#6366f115", ico:"📊" },
  s: { label:"Planillas",   color:"#10b981", bg:"#10b98115", ico:"📋" },
  f: { label:"Formularios", color:"#f59e0b", bg:"#f59e0b15", ico:"📝" },
};

// ─── AGENDA ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  for (const line of text.split("\n")) {
    if (!line.trim()) continue;
    const row = []; let inQ = false, cur = "";
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { row.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    row.push(cur.trim()); rows.push(row);
  }
  return rows;
}

function parseDate(str) {
  if (!str || typeof str !== "string") return null;
  const m = str.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  const d = new Date(+m[3], +m[2]-1, +m[1]);
  return isNaN(d) ? null : d;
}

const VISIT_COLS = [
  {idx:2,name:"V1"},{idx:7,name:"V2"},{idx:8,name:"V3"},
  {idx:9,name:"CT1"},{idx:10,name:"CT2"},{idx:12,name:"V4"},
  {idx:13,name:"CT3"},{idx:14,name:"CT4"},{idx:15,name:"V5"},
  {idx:16,name:"CT5"},{idx:17,name:"CT6"},{idx:18,name:"V6"},
  {idx:19,name:"CT7"},{idx:20,name:"CT8"},{idx:21,name:"V7"},
  {idx:22,name:"CT9"},{idx:23,name:"CT10"},{idx:24,name:"V8"},
  {idx:25,name:"CT11"},{idx:26,name:"CT12"},
];

function extractVisits(rows) {
  const out = [];
  for (const row of rows) {
    if (!row[1]?.includes("VISITAS")) continue;
    const estado = row[28] || row[27] || "";
    if (estado !== "Activo") continue;
    const paciente = row[0]||"", medico = row[11]||"";
    const idRaw = (row[1]||"").split(" - ")[0].trim();
    for (const col of VISIT_COLS) {
      const date = parseDate(row[col.idx]);
      if (date) out.push({ paciente, medico, visitType:col.name, id:idRaw, date });
    }
  }
  return out;
}

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function getNextMonday(from) {
  const d = new Date(from); d.setHours(0,0,0,0);
  const dow = d.getDay();
  d.setDate(d.getDate() + (dow===0?1:(8-dow)%7||7));
  return d;
}

const DAYS_FULL = ["DOMINGO","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO"];
const MONTHS_FULL = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const fmtDD = d => `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
const fmtDay = d => `${["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
const fmtRange = (s,e) => `${s.getDate()} de ${MONTHS_FULL[s.getMonth()]} — ${e.getDate()} de ${MONTHS_FULL[e.getMonth()]} ${e.getFullYear()}`;
const isV = t => t.startsWith("V");

const DR_COLORS = ["#6366f1","#0ea5e9","#10b981","#f59e0b","#ec4899","#8b5cf6","#14b8a6"];
const drMap = {}; let drI = 0;
const drColor = name => { if (!name) return "#94a3b8"; if (!drMap[name]) drMap[name]=DR_COLORS[drI++%DR_COLORS.length]; return drMap[name]; };

function buildText(days) {
  return days.map(({date,items})=>{
    const vs=items.filter(v=>isV(v.visitType)), ls=items.filter(v=>!isV(v.visitType));
    let b=`${DAYS_FULL[date.getDay()]} ${fmtDD(date)}\n${"─".repeat(20)}\n`;
    if(vs.length){b+=`🏥 VISITAS\n`;vs.forEach(v=>{b+=`${v.id} — ${v.paciente} — ${v.visitType}\n`;});}
    if(ls.length){b+=`📞 LLAMADAS\n`;ls.forEach(v=>{b+=`${v.id} — ${v.paciente} — ${v.visitType}\n`;});}
    return b.trimEnd();
  }).join("\n\n");
}

// ─── CHIP ───────────────────────────────────────────────────────────────────
const Chip = ({color, children}) => (
  <span style={{display:"inline-block",background:color+"22",color,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>
    {children}
  </span>
);

// ─── PANEL VIEW ─────────────────────────────────────────────────────────────
function PanelView() {
  const [q, setQ] = React.useState("");
  const meta = SECTION_META["t"];
  const items = DOCS.filter(d => !q || (d.title+d.desc).toLowerCase().includes(q));

  return (
    <div style={{padding:"40px 32px", maxWidth:900, margin:"0 auto"}}>
      {/* Search */}
      <div style={{marginBottom:32,display:"flex",alignItems:"center",gap:12}}>
        <input
          value={q} onChange={e=>setQ(e.target.value.toLowerCase())}
          placeholder="Buscar documento…"
          style={{background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",
            padding:"10px 16px",borderRadius:10,fontSize:14,outline:"none",width:280,fontFamily:"'DM Sans',sans-serif"}}
        />
        {q && <button onClick={()=>setQ("")} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:18}}>×</button>}
      </div>

      {/* Cards */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {items.map((d,i) => (
          <a key={i} href={d.url} target="_blank" rel="noreferrer"
            style={{background:"#1e293b",border:"1px solid #334155",borderRadius:14,
              padding:"20px 24px",textDecoration:"none",color:"inherit",
              display:"flex",alignItems:"center",gap:18,
              transition:"border-color .15s,transform .15s,box-shadow .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=meta.color;e.currentTarget.style.transform="translateX(4px)";e.currentTarget.style.boxShadow="0 4px 20px rgba(99,102,241,.15)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#334155";e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}
          >
            <div style={{width:48,height:48,borderRadius:12,background:meta.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
              {d.icon}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:15,fontWeight:600,color:"#f1f5f9",marginBottom:4}}>
                {d.title}
              </div>
              <div style={{fontSize:13,color:"#64748b",lineHeight:1.4}}>{d.desc}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <span style={{fontSize:12,color:"#6366f1",fontWeight:600,background:"#6366f115",padding:"4px 12px",borderRadius:20}}>
                Abrir →
              </span>
            </div>
          </a>
        ))}
      </div>

      {items.length === 0 && (
        <div style={{textAlign:"center",padding:"60px",color:"#475569",fontSize:14}}>
          No se encontraron documentos.
        </div>
      )}
    </div>
  );
}

// ─── AGENDA VIEW ────────────────────────────────────────────────────────────
function AgendaView() {
  const [allVisits, setAllVisits] = React.useState([]);
  const [loaded, setLoaded] = React.useState(false);
  const [weekStart, setWeekStart] = React.useState(() => getNextMonday(new Date()));
  const [groupBy, setGroupBy] = React.useState("day");
  const [filterDr, setFilterDr] = React.useState("Todos");
  const [tab, setTab] = React.useState("visual");
  const [copied, setCopied] = React.useState(false);
  const [fileName, setFileName] = React.useState("");

  const weekEnd = React.useMemo(() => { const e = addDays(weekStart,4); e.setHours(23,59,59,999); return e; }, [weekStart]);

  const handleFile = React.useCallback(e => {
    const file = e.target.files[0]; if(!file) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = ev => { setAllVisits(extractVisits(parseCSV(ev.target.result))); setLoaded(true); };
    reader.readAsText(file,"UTF-8");
    e.target.value="";
  },[]);

  const filtered = React.useMemo(() =>
    allVisits.filter(v=>v.date>=weekStart&&v.date<=weekEnd&&(filterDr==="Todos"||v.medico===filterDr))
      .sort((a,b)=>a.date-b.date), [allVisits,weekStart,weekEnd,filterDr]);

  const doctors = React.useMemo(() =>
    ["Todos",...new Set(allVisits.map(v=>v.medico).filter(Boolean).sort())], [allVisits]);

  const days = React.useMemo(() => {
    const map={};
    for(const v of filtered){ const k=v.date.toDateString(); if(!map[k]) map[k]={date:v.date,items:[]}; map[k].items.push(v); }
    return Object.values(map).sort((a,b)=>a.date-b.date);
  },[filtered]);

  const byDr = React.useMemo(() => {
    const map={};
    for(const v of filtered){ const k=v.medico||"Sin asignar"; if(!map[k]) map[k]=[]; map[k].push(v); }
    return map;
  },[filtered]);

  const coordText = React.useMemo(()=>buildText(days),[days]);
  const copyText = () => navigator.clipboard.writeText(coordText).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200);});
  const totalV = filtered.filter(v=>isV(v.visitType)).length;
  const totalL = filtered.filter(v=>!isV(v.visitType)).length;

  const btn = (active, color="#6366f1") => ({
    padding:"5px 14px",border:`1px solid ${active?color:"#334155"}`,borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:500,
    background:active?color:"#1e293b",color:active?"white":"#94a3b8",fontFamily:"'DM Sans',sans-serif",
  });

  return (
    <div style={{padding:"28px 32px",maxWidth:1000,margin:"0 auto"}}>
      {/* Upload + Week nav */}
      <div style={{background:"#1e293b",borderRadius:12,padding:"16px 20px",marginBottom:18,display:"flex",alignItems:"center",justifyContent:"space-between",border:"1px solid #334155"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setWeekStart(addDays(weekStart,-7))}
            style={{border:"1px solid #334155",background:"none",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18,color:"#64748b"}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:600,color:"#f1f5f9"}}>{fmtRange(weekStart,weekEnd)}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:3,display:"flex",gap:10,justifyContent:"center"}}>
              {!loaded ? "Cargá el CSV para ver las visitas" : (
                <>{filtered.length} total {totalV>0&&<span>🏥 {totalV} presencial{totalV>1?"es":""}</span>}{totalL>0&&<span>📞 {totalL} llamada{totalL>1?"s":""}</span>}</>
              )}
            </div>
          </div>
          <button onClick={()=>setWeekStart(addDays(weekStart,7))}
            style={{border:"1px solid #334155",background:"none",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18,color:"#64748b"}}>›</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {loaded && <span style={{color:"#475569",fontSize:12}}>{fileName}</span>}
          <label style={{background:"#6366f1",color:"white",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
            ↑ Cargar CSV
            <input type="file" accept=".csv" onChange={handleFile} style={{display:"none"}}/>
          </label>
        </div>
      </div>

      {/* Controls */}
      {loaded && (
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <button onClick={()=>setWeekStart(getNextMonday(new Date()))} style={{...btn(false),...{borderColor:"#6366f1",color:"#6366f1"}}}>
            ↺ Próxima semana
          </button>
          <div style={{width:1,height:20,background:"#334155",margin:"0 4px"}}/>
          <span style={{fontSize:12,color:"#64748b"}}>Médico:</span>
          {doctors.map(d=>(
            <button key={d} onClick={()=>setFilterDr(d)}
              style={{padding:"4px 13px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",
                background:filterDr===d?(d==="Todos"?"#334155":drColor(d)):"#1e293b",
                color:filterDr===d?"white":"#64748b"}}>
              {d}
            </button>
          ))}
          <div style={{marginLeft:"auto",display:"flex",border:"1px solid #334155",borderRadius:8,overflow:"hidden"}}>
            {[["visual","👁 Visual"],["texto","📋 Coordinadora"]].map(([v,l])=>(
              <button key={v} onClick={()=>setTab(v)}
                style={{padding:"5px 14px",border:"none",cursor:"pointer",fontSize:12,fontWeight:500,fontFamily:"'DM Sans',sans-serif",
                  background:tab===v?"#334155":"transparent",color:tab===v?"#f1f5f9":"#64748b"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Empty states */}
      {!loaded && (
        <div style={{background:"#1e293b",borderRadius:12,padding:"70px 40px",textAlign:"center",border:"1px solid #334155"}}>
          <div style={{fontSize:42,marginBottom:14}}>📋</div>
          <div style={{fontSize:15,fontWeight:500,color:"#cbd5e1",marginBottom:6}}>Subí el archivo CSV del tracker</div>
          <div style={{fontSize:13,color:"#64748b"}}>Cada miércoles: subís el CSV y ves las visitas de la semana siguiente</div>
        </div>
      )}
      {loaded && filtered.length===0 && (
        <div style={{background:"#1e293b",borderRadius:12,padding:"60px",textAlign:"center",color:"#64748b",border:"1px solid #334155"}}>
          No hay visitas programadas para esta semana.
        </div>
      )}

      {/* Visual tab */}
      {loaded && filtered.length>0 && tab==="visual" && (
        <>
          <div style={{display:"flex",gap:4,marginBottom:14}}>
            {[["day","Por día"],["doctor","Por médico"]].map(([v,l])=>(
              <button key={v} onClick={()=>setGroupBy(v)} style={btn(groupBy===v)}>{l}</button>
            ))}
          </div>

          {groupBy==="day" && (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {days.map(({date,items})=>{
                const vs=items.filter(v=>isV(v.visitType)), ls=items.filter(v=>!isV(v.visitType));
                return (
                  <div key={date.toDateString()} style={{background:"#1e293b",borderRadius:12,overflow:"hidden",border:"1px solid #334155"}}>
                    <div style={{padding:"11px 20px",background:"#0f172a",borderBottom:"1px solid #334155",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:700,fontSize:13,color:"#f1f5f9"}}>{DAYS_FULL[date.getDay()]} {fmtDD(date)}</span>
                      <div style={{display:"flex",gap:8}}>
                        {vs.length>0&&<Chip color="#6366f1">🏥 {vs.length} visita{vs.length>1?"s":""}</Chip>}
                        {ls.length>0&&<Chip color="#0ea5e9">📞 {ls.length} llamada{ls.length>1?"s":""}</Chip>}
                      </div>
                    </div>
                    {vs.length>0&&<>
                      <div style={{padding:"7px 20px 3px",fontSize:10,fontWeight:700,color:"#6366f1",textTransform:"uppercase",letterSpacing:"0.09em",background:"#6366f10a"}}>🏥 Visitas</div>
                      <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <tbody>{vs.map((v,i)=>(
                          <tr key={i} style={{borderBottom:i<vs.length-1?"1px solid #0f172a":"none"}}>
                            <td style={{padding:"9px 20px",width:110,fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{v.id}</td>
                            <td style={{padding:"9px 8px",fontSize:14,color:"#cbd5e1",fontWeight:500}}>{v.paciente}</td>
                            <td style={{padding:"9px 20px",width:70}}><Chip color="#6366f1">{v.visitType}</Chip></td>
                            <td style={{padding:"9px 20px",width:100}}>{v.medico&&<Chip color={drColor(v.medico)}>{v.medico}</Chip>}</td>
                          </tr>
                        ))}</tbody>
                      </table>
                    </>}
                    {ls.length>0&&<>
                      <div style={{padding:"7px 20px 3px",fontSize:10,fontWeight:700,color:"#0ea5e9",textTransform:"uppercase",letterSpacing:"0.09em",background:"#0ea5e90a",borderTop:vs.length>0?"1px solid #0f172a":"none"}}>📞 Llamadas / CT</div>
                      <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <tbody>{ls.map((v,i)=>(
                          <tr key={i} style={{borderBottom:i<ls.length-1?"1px solid #0f172a":"none"}}>
                            <td style={{padding:"9px 20px",width:110,fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{v.id}</td>
                            <td style={{padding:"9px 8px",fontSize:14,color:"#cbd5e1",fontWeight:500}}>{v.paciente}</td>
                            <td style={{padding:"9px 20px",width:70}}><Chip color="#0ea5e9">{v.visitType}</Chip></td>
                            <td style={{padding:"9px 20px",width:100}}>{v.medico&&<Chip color={drColor(v.medico)}>{v.medico}</Chip>}</td>
                          </tr>
                        ))}</tbody>
                      </table>
                    </>}
                  </div>
                );
              })}
            </div>
          )}

          {groupBy==="doctor" && (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {Object.entries(byDr).map(([doc,items])=>(
                <div key={doc} style={{background:"#1e293b",borderRadius:12,overflow:"hidden",border:"1px solid #334155",borderLeft:`3px solid ${drColor(doc)}`}}>
                  <div style={{padding:"11px 20px",borderBottom:"1px solid #334155",display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:700,fontSize:13,color:"#f1f5f9"}}>Dr/a. {doc}</span>
                    <span style={{fontSize:11,background:"#334155",color:"#94a3b8",padding:"2px 10px",borderRadius:12,fontWeight:600}}>{items.length} visita{items.length>1?"s":""}</span>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <tbody>{items.sort((a,b)=>a.date-b.date).map((v,i)=>(
                      <tr key={i} style={{borderBottom:i<items.length-1?"1px solid #0f172a":"none"}}>
                        <td style={{padding:"9px 20px",width:110,fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{v.id}</td>
                        <td style={{padding:"9px 8px",fontSize:14,color:"#cbd5e1",fontWeight:500}}>{v.paciente}</td>
                        <td style={{padding:"9px 8px",fontSize:12,color:"#64748b"}}>{fmtDay(v.date)}</td>
                        <td style={{padding:"9px 20px",width:70}}><Chip color={isV(v.visitType)?"#6366f1":"#0ea5e9"}>{v.visitType}</Chip></td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* Texto coordinadora */}
      {loaded && filtered.length>0 && tab==="texto" && (
        <div style={{background:"#1e293b",borderRadius:12,overflow:"hidden",border:"1px solid #334155"}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid #334155",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <span style={{fontWeight:600,fontSize:14,color:"#f1f5f9"}}>Texto para coordinadora</span>
              <span style={{fontSize:12,color:"#64748b",marginLeft:10}}>Listo para copiar y pegar</span>
            </div>
            <button onClick={copyText}
              style={{background:copied?"#10b981":"#6366f1",color:"white",border:"none",borderRadius:8,
                padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:500,fontFamily:"'DM Sans',sans-serif",transition:"background .2s"}}>
              {copied?"✓ ¡Copiado!":"⎘ Copiar todo"}
            </button>
          </div>
